name: Generate Release Version

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build Unsigned Release APK
        run: ./gradlew assembleRelease

      - name: Build Unsigned Release App Bundle
        run: ./gradlew bundleRelease

      - name: Decode keystore
        env:
          APP_KEYSTORE: ${{ secrets.APP_KEYSTORE }}
        run: |
          echo "$APP_KEYSTORE" | base64 -d > keystore.jks
          cp keystore.jks "${{ github.workspace }}/app/build/outputs/apk/release/keystore.jks"
          cp keystore.jks "${{ github.workspace }}/app/build/outputs/bundle/release/keystore.jks"

      - name: Locate Android build tools
        id: android-build-tools
        shell: bash
        run: |
          sdk_root="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$sdk_root" ]; then
            echo "ANDROID_SDK_ROOT/ANDROID_HOME is not set" >&2
            exit 1
          fi

          apksigner_path="$(find "$sdk_root/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          if [ -z "$apksigner_path" ]; then
            echo "apksigner not found under $sdk_root/build-tools" >&2
            exit 1
          fi

          echo "apksigner=$apksigner_path" >> "$GITHUB_OUTPUT"

      - name: Sign Release APK
        working-directory: ${{ github.workspace }}/app/build/outputs/apk/release
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          "${{ steps.android-build-tools.outputs.apksigner }}" sign \
            --ks keystore.jks \
            --ks-key-alias "$KEY_ALIAS" \
            --ks-pass env:KEYSTORE_PASSWORD \
            --key-pass env:KEY_PASSWORD \
            --out app-release.apk \
            app-release-unsigned.apk

      - name: Sign Release App Bundle
        working-directory: ${{ github.workspace }}/app/build/outputs/bundle/release
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          jarsigner \
            -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore keystore.jks \
            -storepass "$KEYSTORE_PASSWORD" \
            -keypass "$KEY_PASSWORD" \
            app-release.aab \
            "$KEY_ALIAS"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ github.ref_name }}
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            app/build/outputs/apk/release/app-release.apk \
            app/build/outputs/bundle/release/app-release.aab \
            --generate-notes
