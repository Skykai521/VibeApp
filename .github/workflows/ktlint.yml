name: Kotlin Lint Check

on:
  push:
    branches:
      - "dev"
      - "main"
    paths-ignore:
      - ".gitignore"
      - "**.md"
      - "LICENSE"
      - ".idea/**"
      - ".editorconfig"
      - "images/**"
      - "metadata/**"
  pull_request:
    branches:
      - "dev"
      - "main"
    paths-ignore:
      - ".gitignore"
      - "**.md"
      - "LICENSE"
      - ".idea/**"
      - ".editorconfig"
      - "images/**"
      - "metadata/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  ktlint:
    name: Check Kotlin Code Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      KTLINT_VERSION: "1.3.1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      - name: Download ktlint
        run: |
          curl -sSLo ktlint "https://github.com/pinterest/ktlint/releases/download/${KTLINT_VERSION}/ktlint"
          chmod +x ktlint

      - name: Run ktlint
        run: |
          find . -type f \( -name "*.kt" -o -name "*.kts" \) \
            -not -path "*/build/*" \
            -not -path "./.gradle/*" \
            -print0 | xargs -0 ./ktlint --reporter=plain
